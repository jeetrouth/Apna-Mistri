<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApnaMistri - Customer Setup</title>

<!-- Link CSS -->
<link rel="stylesheet" href="usersetup.css">
</head>

<body>

<div class="setup-card">

  <h2>Complete Your Profile</h2>
  <p class="subtitle">
    Set up your customer account to start booking services.
  </p>

  <div class="input-group">
    <label>Full Name *</label>
    <input type="text" placeholder="Enter full name">
  </div>

  <div class="input-group">
    <label>Profile Photo</label>
    <input class="file-input" type="file">
  </div>

  <div class="input-group">
    <label>Phone Number *</label>
    <input type="tel" placeholder="+91XXXXXXXXXX">
  </div>

  <div class="input-group">
    <label>Email Address *</label>
    <input type="email" placeholder="example@email.com">
  </div>

  <div class="input-group">
    <label>Address *</label>
    <textarea rows="2" placeholder="Enter full address"></textarea>
  </div>

  <div class="row">
    <div class="input-group">
      <label>City *</label>
      <input type="text" placeholder="City">
    </div>

    <div class="input-group">
      <label>PIN Code *</label>
      <input type="text" placeholder="700091">
    </div>
  </div>

  <button>Next</button>

</div>

</body>
</html>
