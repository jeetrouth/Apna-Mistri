{% extends "base.html" %}
{% block content %}
    <title>Complete Your Profile | ApnaMistri</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/worker_onboarding.css') }}">
<body>

    <!-- ===== TOPBAR ===== 
    <header class="topbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="ApnaMistri Logo">
            <span>ApnaMistri</span>
        </div>
    </header>
-->
    <!-- ===== MAIN CONTENT ===== -->
    <main class="onboarding-container">

        <!-- Page Header -->
        <section class="page-header">
            <h1>Complete Your Profile</h1>
            <p>Finish setting up your worker profile to start receiving jobs.</p>

            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" style="width: 50%;"></div>
            </div>
        </section>

        <!-- ===== FORM CARD ===== -->
        <section class="form-card">

            <form method="POST">


                <!-- ===== BASIC IDENTITY ===== -->
                <h2>Basic Identity</h2>

                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label>Profile Photo *</label>
                    <input type="file" name="photo" accept="image/*" required>
                </div>

                <div class="form-group">
                    <label>Primary Trade *</label>
                    <select name="trade" required>
                        <option value="">Select Trade</option>
                        <option>Electrician</option>
                        <option>Plumber</option>
                        <option>Carpenter</option>
                        <option>Painter</option>
                        <option>AC Technician</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Years of Experience *</label>
                    <select name="experience" required>
                        <option value="">Select</option>
                        <option>0-1</option>
                        <option>1-3</option>
                        <option>3-5</option>
                        <option>5-10</option>
                        <option>10+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>City *</label>
                    <input type="text" name="city" required>
                </div>

                <div class="form-group">
                    <label>Skills *</label>
                    <select name="skills" required>
                        <option value="">Select at least one</option>
                        <option>Wiring</option>
                        <option>Pipe Repair</option>
                        <option>Furniture Assembly</option>
                        <option>Painting</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Service Radius *</label>
                    <select name="radius" required>
                        <option>5 km</option>
                        <option selected>10 km</option>
                        <option>20 km</option>
                    </select>
                </div>

                <!-- ===== OPTIONAL SECTION ===== -->
                <div class="optional-toggle">
                    <button type="button" id="toggleOptional">
                        Add More Details (Optional)
                    </button>
                </div>

                <div class="optional-section" id="optionalSection">

                    <h2>Additional Details</h2>

                    <div class="form-group">
                        <label>Short Bio</label>
                        <textarea name="bio" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Starting Price (₹)</label>
                        <input type="number" name="price">
                    </div>

                    <div class="form-group">
                        <label>Availability Type</label>
                        <select name="availability">
                            <option>Full Time</option>
                            <option>Part Time</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Working Hours</label>
                        <input type="text" placeholder="9:00 AM - 6:00 PM">
                    </div>

                    <div class="form-group">
                        <label>Emergency Available</label>
                        <select name="emergency">
                            <option>Yes</option>
                            <option>No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>ID Proof Upload</label>
                        <input type="file" name="id_proof">
                    </div>

                </div>

                <!-- ===== BUTTONS ===== -->
                <div class="form-actions">
                    <button type="submit" class="primary-btn">
                        Complete Profile
                    </button>

                    <a href="#" class="skip-link">

                        Skip for now
                    </a>
                </div>

            </form>

        </section>

    </main>

    <!-- JS -->
    <script src="{{ url_for('static', filename='js/onboarding.js') }}"></script>

</body>
{% endblock %}
