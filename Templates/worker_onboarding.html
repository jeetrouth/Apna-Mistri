<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Worker Onboarding | ApnaMistri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/worker_onboarding.css') }}">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.jpeg') }}">
        <span>ApnaMistri</span>
    </div>
</div>

<!-- MAIN CONTAINER -->
<div class="onboarding-container">

    <div class="onboarding-card">

        <div class="step-indicator">
            Step <span id="step-number">1</span> of 3
        </div>

        <h1>Complete Your Profile</h1>
        <p class="subtitle">Set up your worker account to start receiving jobs.</p>

        <form id="onboardingForm">

            <!-- STEP 1 -->
            <div class="form-step active">

                <label>Full Name *</label>
                <input type="text" required>

                <label>Profile Photo *</label>
                <input type="file" id="photoInput" accept="image/*" required>
                <img id="photoPreview" class="preview">
                <p id="fileName" class="file-name"></p>

                <label>City *</label>
                <input type="text" required>

                <button type="button" class="next-btn">Next</button>
            </div>


            <!-- STEP 2 -->
            <div class="form-step">

                <label>Primary Trade *</label>
                <select required>
                    <option value="" disabled selected hidden>Choose trade</option>
                    <option>Electrician</option>
                    <option>Plumber</option>
                    <option>Carpenter</option>
                    <option>Painter</option>
                </select>

                <label>Years of Experience *</label>
                <select required>
                    <option value="" disabled selected hidden>Choose experience</option>
                    <option>1-2 Years</option>
                    <option>3-5 Years</option>
                    <option>5+ Years</option>
                </select>

                <label>Skills *</label>
                <input type="text" placeholder="e.g. Wiring, Installation, Repair" required>

                <label>Service Radius *</label>
                <select required>
                    <option>5 km</option>
                    <option>10 km</option>
                    <option>20 km</option>
                </select>

                <div class="btn-group">
                    <button type="button" class="prev-btn">Back</button>
                    <button type="button" class="next-btn">Next</button>
                </div>
            </div>


            <!-- STEP 3 -->
            <div class="form-step">

                <label>Available Days</label>
                <input type="text" placeholder="Mon - Sat">

                <label>Working Hours</label>
                <input type="text" placeholder="9 AM - 6 PM">

                <label>Short Bio</label>
                <textarea rows="3"></textarea>

                <div class="btn-group">
                    <button type="button" class="prev-btn">Back</button>
                    <button type="submit" class="complete-btn">Complete Profile</button>
                </div>

                <div class="skip-link">
                    <a href="/worker-dashboard">Skip for now</a>
                </div>

            </div>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='js/worker_onboarding.js') }}"></script>

</body>
</html>
