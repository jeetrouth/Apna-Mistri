<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApnaMistri Workers</title>
<link rel="stylesheet" href="wg3.css">
</head>

<body>

<header class="topbar">
    <div class="brand">
        <img src="WhatsApp Image 2026-02-15 at 3.48.49 PM (1).jpeg" class="logo">
        <span>ApnaMistri</span>
    </div>

    <div class="menu">
        <button onclick="goLogin()">Login</button>
        <button onclick="goProfile()">My Profile</button>
    </div>
</header>

<div class="search-area">
<input type="text" id="searchInput"
placeholder="Search by skill (Plumber, Electrician...)">

<!-- ===== SEARCH + LOCATION ===== -->
<div class="search-area">

<p class="location">
Your Location:
<input type ="text" id="locationSelect"
placeholder="search location(SaltLake)">
<!-- <select id="locationSelect">
<option>Salt Lake, Kolkata</option>
<option>New Town</option>
<option>Howrah</option>
<option>Dumdum</option>
</select> -->
</p>

</div>

<div class="layout">

<!-- FILTERS -->
<div class="filters">
<h3>Filters</h3>

<p class="filter-title">Trade:</p>
<label><input type="checkbox" checked> Plumber</label>
<label><input type="checkbox"> Electrician</label>
<label><input type="checkbox"> Welder</label>

<hr>

<p class="filter-title">Distance:</p>
<select>
<option>Within 5 km</option>
<option>Within 10 km</option>
<option>Within 20 km</option>
</select>

<label><input type="checkbox" checked> Verified Only</label>

<button class="showBtn" onclick="toggleWorkers()">Nearby Workers</button>
</div>

<!-- RIGHT SIDE CONTENT -->
<div class="rightSide">

<!-- WORKERS POPUP -->
<div class="workers-popup" id="workersPopup">
<h3>Nearby Workers:</h3>

<div class="worker" data-skill="plumber">
<img src="worker1.jpg">
<div>
<h4>Rahul Mistri</h4>
<p>Plumber • 2.1 km away</p>
</div>
<button onclick="openChat('Rahul Mistri')">Chat</button>
</div>

<div class="worker" data-skill="electrician">
<img src="worker2.jpg">
<div>
<h4>Suresh</h4>
<p>Electrician • 3.4 km away</p>
</div>
<button onclick="openChat('Suresh')">Chat</button>
</div>
</div>

<!-- ⭐ GPS BOX ADDED -->
<div class="gpsBox">
<div class="gpsLabel">📍 GPS Map Area</div>
</div>

</div>
</div>

<!-- CHAT BOX -->
<div id="chatBox" class="chatBox">
<h4 id="chatTitle"></h4>
<div class="chatMessages" id="chatMessages"></div>

<input type="text" id="chatInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
<button class="closeChat" onclick="closeChat()">Close</button>
</div>

<script src="wg2.js"></script>
</body>
</html>
